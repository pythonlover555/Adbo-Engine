<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light dark; }
      body {
        width: 260px;
        margin: 0;
        padding: 14px 16px;
        font: 13px/1.45 system-ui, sans-serif;
      }
      h1 { font-size: 14px; margin: 0 0 2px; }
      p.sub { margin: 0 0 12px; color: #6b7280; font-size: 11px; word-break: break-all; }
      .row { display: flex; gap: 8px; margin-bottom: 12px; }
      button {
        flex: 1;
        padding: 8px 0;
        font: inherit;
        font-weight: 600;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
      }
      #start { background: #6366f1; }
      #stop { background: #ef4444; }
      button:disabled { opacity: 0.5; cursor: default; }
      #status {
        padding: 8px 10px;
        border-radius: 6px;
        background: #f3f4f6;
        color: #111;
        min-height: 18px;
        font-size: 12px;
      }
      @media (prefers-color-scheme: dark) {
        #status { background: #1f2937; color: #e5e7eb; }
      }
    </style>
  </head>
  <body>
    <h1>Conditional Navigation</h1>
    <p class="sub">Loops the source URL past google.com until it lands on uplevelrewards.com, then scrapes.</p>
    <div class="row">
      <button id="start">Start</button>
      <button id="stop">Stop</button>
    </div>
    <div id="status">Idle.</div>
    <script src="popup.js"></script>
  </body>
</html>
